<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a2e; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; fill: #555; }
    .c-gray rect { fill: #f1efe8; stroke: #888780; }
    .c-blue rect { fill: #e6f1fb; stroke: #185fa5; }
    .c-purple rect { fill: #eeedfe; stroke: #534ab7; }
    .c-teal rect { fill: #e1f5ee; stroke: #0f6e56; }
    .c-amber rect { fill: #faeeda; stroke: #854f0b; }
    .c-green rect { fill: #eaf3de; stroke: #3b6d11; }
    .arr { stroke: #888; fill: none; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>
</defs>

<!-- User layer -->
<g class="c-gray">
  <rect x="240" y="20" width="200" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="46" text-anchor="middle">User (browser)</text>
</g>

<!-- Input tabs -->
<g class="c-gray"><rect x="44" y="114" width="112" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="100" y="136" text-anchor="middle">Upload / Camera</text></g>
<g class="c-gray"><rect x="194" y="114" width="112" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="250" y="136" text-anchor="middle">Live Agent</text></g>
<g class="c-gray"><rect x="344" y="114" width="112" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="136" text-anchor="middle">Call Guard</text></g>
<g class="c-gray"><rect x="504" y="114" width="112" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="560" y="136" text-anchor="middle">Chat</text></g>

<!-- Arrows from user to inputs -->
<line x1="300" y1="64" x2="130" y2="114" class="arr" stroke="#888"/>
<line x1="320" y1="64" x2="250" y2="114" class="arr" stroke="#888"/>
<line x1="360" y1="64" x2="400" y2="114" class="arr" stroke="#888"/>
<line x1="380" y1="64" x2="540" y2="114" class="arr" stroke="#888"/>

<!-- Cloud Run container -->
<rect x="30" y="168" width="620" height="260" rx="12" fill="#e6f1fb" fill-opacity="0.3" stroke="#378ADD" stroke-width="1" stroke-dasharray="6 3"/>
<text class="ts" x="50" y="186" style="fill:#185FA5;font-weight:600">Google Cloud Run</text>

<!-- Flask backend -->
<g class="c-blue">
  <rect x="200" y="194" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="212" text-anchor="middle">Flask backend (main.py)</text>
  <text class="ts" x="340" y="228" text-anchor="middle">/analyze  /chat  /voice-analyze  /agent</text>
</g>

<!-- Arrows from inputs to Flask -->
<line x1="100" y1="150" x2="230" y2="194" class="arr" stroke="#378ADD"/>
<line x1="250" y1="150" x2="280" y2="194" class="arr" stroke="#378ADD"/>
<line x1="400" y1="150" x2="380" y2="194" class="arr" stroke="#378ADD"/>
<line x1="560" y1="150" x2="430" y2="194" class="arr" stroke="#378ADD"/>

<!-- ADK Orchestrator -->
<g class="c-purple">
  <rect x="200" y="264" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="282" text-anchor="middle">ADK Orchestrator</text>
  <text class="ts" x="340" y="298" text-anchor="middle">phisheye_orchestrator</text>
</g>
<line x1="340" y1="238" x2="340" y2="264" class="arr" stroke="#7F77DD"/>

<!-- Sub-agents -->
<g class="c-teal">
  <rect x="50" y="336" width="150" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="358" text-anchor="middle">Visual Detective</text>
  <text class="ts" x="125" y="376" text-anchor="middle">scan_image tool</text>
</g>
<g class="c-teal">
  <rect x="265" y="336" width="150" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="358" text-anchor="middle">Live Sentinel</text>
  <text class="ts" x="340" y="376" text-anchor="middle">analyze_call tool</text>
</g>
<g class="c-teal">
  <rect x="480" y="336" width="150" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="555" y="358" text-anchor="middle">Educator Agent</text>
  <text class="ts" x="555" y="376" text-anchor="middle">get_education tool</text>
</g>

<!-- Arrows to sub-agents -->
<line x1="280" y1="308" x2="160" y2="336" class="arr" stroke="#1D9E75"/>
<line x1="340" y1="308" x2="340" y2="336" class="arr" stroke="#1D9E75"/>
<line x1="400" y1="308" x2="510" y2="336" class="arr" stroke="#1D9E75"/>

<!-- Gemini -->
<g class="c-amber">
  <rect x="110" y="450" width="460" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="468" text-anchor="middle">Gemini 3.1 Pro Preview</text>
  <text class="ts" x="340" y="484" text-anchor="middle">Vision + text + multimodal reasoning</text>
</g>
<line x1="125" y1="388" x2="200" y2="450" class="arr" stroke="#BA7517"/>
<line x1="340" y1="388" x2="340" y2="450" class="arr" stroke="#BA7517"/>
<line x1="555" y1="388" x2="470" y2="450" class="arr" stroke="#BA7517"/>

<!-- Cloud TTS -->
<g class="c-green">
  <rect x="44" y="520" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="134" y="538" text-anchor="middle">Cloud TTS</text>
  <text class="ts" x="134" y="554" text-anchor="middle">Journey-F voice</text>
</g>

<!-- GenAI SDK -->
<g class="c-blue">
  <rect x="456" y="520" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="546" y="538" text-anchor="middle">Google GenAI SDK</text>
  <text class="ts" x="546" y="554" text-anchor="middle">google-adk + google-genai</text>
</g>

<line x1="200" y1="472" x2="160" y2="520" class="arr" stroke="#639922"/>
</svg>
